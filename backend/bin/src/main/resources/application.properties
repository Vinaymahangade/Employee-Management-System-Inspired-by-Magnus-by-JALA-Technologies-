# ============================================================
# Application Configuration - JALA Employee Management System
# ============================================================
server.port=8080

# Serve static frontend files from /frontend directory
spring.web.resources.static-locations=classpath:/static/

# ============================================================
# PostgreSQL Database Configuration
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/emp_management_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate Configuration
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# JWT Configuration
# ============================================================
app.jwt.secret=JalaEmpMgmtSecretKey2024VeryLongSecretKeyForHMACSHA256Algorithm!@#
app.jwt.expiration=86400000

# ============================================================
# File Upload Configuration
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# ============================================================
# Logging Configuration
# ============================================================
logging.level.com.jala=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# Swagger UI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
